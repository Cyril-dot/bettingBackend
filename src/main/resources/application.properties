spring.application.name=${SPRING_APPLICATION_NAME:BettingWebsite}

# The Odds API
api.odds.key1=${API_ODDS_KEY1}
api.odds.key2=${API_ODDS_KEY2}
api.odds.base-url=${API_ODDS_BASE_URL:https://api.the-odds-api.com/v4}

api.football.key=${API_FOOTBALL_KEY}
api.football.base-url=${API_FOOTBALL_BASE_URL:https://api.football-data.org/v4}

api.apifootball.key=${API_APIFOOTBALL_KEY}
api.apifootball.base-url=${API_APIFOOTBALL_BASE_URL:https://v3.football.api-sports.io}

spring.jpa.properties.hibernate.jdbc.time_zone=UTC

paystack.callback.url=${PAYSTACK_CALLBACK_URL}

# API-Football fallback
api.foot.key=${API_FOOT_KEY}
api.foot.base-url=${API_FOOT_BASE_URL:https://v3.football.api-sports.io}

# Paystack
paystack.secret.key=${PAYSTACK_SECRET_KEY}
paystack.public.key=${PAYSTACK_PUBLIC_KEY}
paystack.base.url=${PAYSTACK_BASE_URL:https://api.paystack.co}

# Scheduling
spring.task.scheduling.pool.size=5

server.port=${PORT:8080}
server.servlet.context-path=/

# AI API
asi.api.key=${ASI_API_KEY}

# DATABASE CONFIG
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bettingSite?currentSchema=public}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.hbm2ddl.halt_on_error=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
logging.level.org.hibernate.tool.schema.internal.ExceptionHandlerLoggedImpl=ERROR
logging.level.org.hibernate.orm.schema=DEBUG

# FLYWAY
spring.flyway.enabled=false

# JWT CONFIGURATION
jwt.secret=${JWT_SECRET}
jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:3600000}
jwt.access.admin-expiration-ms=${JWT_ADMIN_ACCESS_EXPIRATION_MS:21600000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
security.token.encryption-key=${TOKEN_ENCRYPTION_KEY}

# HIKARI CONNECTION POOL
spring.datasource.hikari.connection-init-sql=SET search_path TO public
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.initialization-fail-timeout=0
logging.level.com.zaxxer.hikari=INFO

# ASYNC THREAD POOL
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=25

# WEBSOCKET CONFIG
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536

# FILE UPLOAD CONFIG
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# DOCKER
spring.docker.compose.enabled=false

# CLOUDINARY
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# LOGGING CONFIG
logging.level.root=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

logging.file.name=logs/marketplace.log
logging.file.max-size=10MB
logging.file.max-history=30

spring.jackson.deserialization.fail-on-unknown-properties=false

logging.level.org.springframework=DEBUG
logging.level.com.bettingPlatform=DEBUG